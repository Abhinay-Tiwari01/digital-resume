    <div class="contact-grid">
        <!-- LEFT SIDE -->
        <div class="contact-left">
            <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
                <input type="hidden" name="access_key" value="be875c3f-2498-4af5-b48c-fd8600db325a">

                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@email.com" required>
                </div>

                <div class="form-group">
                    <label>Service Interested In</label>
                    <select name="service">
                        <option>I want to hire you</option>
                        <option>I want to invite you for an interview</option>
                        <option>I want to discuss a project</option>
                        <option>Just testing your form</option>
                        <option>I want to schedule a meeting</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Message</label>
                    <textarea rows="5" name="message" placeholder="Tell us about your project..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary full-width">Send Message →</button>
            </form>


        </div>

        <!-- RIGHT SIDE -->
        <div class="contact-right">

            <div class="map-container">
                <iframe

                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            <div class="contact-cards">

                    <div class="contact-icon">📱</div>
                    <div>

                </div>

                    </div>

                <div class="contact-card">
